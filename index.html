<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMRL - Pac-Man Roguelike</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <h1>PMRL: Pac-Man Roguelike</h1>
        <canvas id="gameCanvas" width="832" height="576"></canvas>
        <div id="ui">
            Score: <span id="scoreVal">0</span> | 
            Level: <span id="levelVal">1</span> | 
            Dots: <span id="dotCounterVal">0/0</span> | 
            Phase: <span id="phaseVal" style="color: #ffffff;">COLLECTION</span>
        </div>
        <p>Use WASD or Arrow Keys. Press once to move continuously.</p>
    </div>
    <!-- Load structural scripts in exact dependency order -->
    <script src="map_logic.js"></script>
<script src="entities/baby.js"></script>
<script src="game_state.js"></script>
<script src="game_render.js"></script>
<script src="game.js"></script>
</body>
</html>
